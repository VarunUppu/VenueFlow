steps:
  # Step 1 — Run tests before building anything
  - name: 'node:20-alpine'
    id: 'run-tests'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npm ci && npm test'

  # Step 2 — Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow:latest'
      - '.'
    waitFor: ['run-tests']

  # Step 3 — Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/venueflow'
    waitFor: ['build-image']

  # Step 4 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'venueflow'
      - '--image=gcr.io/$PROJECT_ID/venueflow:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,FCM_SERVER_KEY=FCM_SERVER_KEY:latest'
    waitFor: ['push-image']

images:
  - 'gcr.io/$PROJECT_ID/venueflow:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/venueflow:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'
